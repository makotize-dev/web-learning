<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>自己紹介</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
  header {
    padding: 20px;
    background: rgb(234, 122, 11);
  }
  main {
    padding: 50px;
  }
  body {
    background: #faf8f5;
    color: #434242;
    font-family: 'Noto Sans JP', sans-serif;
  }
  section {
    margin-bottom: 50px;
  }
  h2 {
    border-left: 5px solid #f6c13b;
    padding-left: 10px;
  }
  </style>
</head>
<body>
  <!-- ここに header と main と section を書く -->
   <header>
    <h1>安河内誠の自己紹介</h1>
</header>
   <main>
    <section>
        <h2>名前</h2>
        <p>
            安河内誠（やすこうちまこと）です
        </p>
    </section>
    <section>
        <h2>暮らし</h2>
        <p>
            海の近くで暮らしています
        </p>
    </section>
    <section>
        <h2>仕事</h2>
        <p>
            お金の仕事をしています
        </p>
    </section>
    <section>
        <h2>好きなこと</h2>
        <p>
            ぼんやりすること
        </p>
    </section>
    <section>
        <h2>好きなもの</h2>
        <p>
            ゆったりしたもの
        </p>
    </section>
   </main>
</body>
</html>
